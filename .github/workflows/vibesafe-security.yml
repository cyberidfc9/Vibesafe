# VibeSafe Security Scan — GitHub Actions Workflow
# Generated by: vibesafe ci-init
# Docs: https://github.com/cyberidfc9/Vibesafe

name: VibeSafe Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  # Run weekly security scan
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  vibesafe-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for gitleaks

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install VibeSafe
        run: |
          pip install -e .
          # Optional: Install external security tools
          # pip install semgrep
          # See README for full tool installation guide

      # Optional: Install Gitleaks
      # - name: Install Gitleaks
      #   run: |
      #     curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64 -o /usr/local/bin/gitleaks
      #     chmod +x /usr/local/bin/gitleaks

      # Optional: Install Trivy
      # - name: Install Trivy
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     scan-type: 'fs'

      - name: Run VibeSafe Security Scan
        run: |
          vibesafe scan . --ci --format both
        env:
          CI: true

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vibesafe-security-report
          path: |
            vibesafe-report-*.html
            vibesafe-report-*.md
            vibesafe-report-*.pdf
          retention-days: 30

